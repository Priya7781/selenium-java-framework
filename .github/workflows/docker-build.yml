name: Build Docker Image

on:
  push:
    branches:
      - main
    paths:
      - Dockerfile
      - pom.xml

jobs:

  build:

    runs-on: ubuntu-latest
    

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/selenium-framework:latest .

      - name: Push Docker Image
        run: |
          docker push ghcr.io/$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')/selenium-framework:latest